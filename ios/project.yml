name: ExpenseTracker
options:
  bundleIdPrefix: com.bkes994408
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: 1
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: ExpenseTracker
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    PRODUCT_BUNDLE_IDENTIFIER: com.bkes994408.expensetracker

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: 6.29.3

targets:
  ExpenseTracker:
    type: application
    platform: iOS
    sources:
      - path: ExpenseTracker
    dependencies:
      - package: GRDB
        product: GRDB
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIUserInterfaceStyle: Light
        ENABLE_PREVIEWS: YES
        SWIFTUI_PREVIEWS: YES
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

  ExpenseTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ExpenseTrackerTests
    dependencies:
      - target: ExpenseTracker
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ExpenseTracker.app/ExpenseTracker"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  ExpenseTracker:
    build:
      targets:
        ExpenseTracker: all
        ExpenseTrackerTests: [test]
    test:
      targets:
        - name: ExpenseTrackerTests
      gatherCoverageData: false
